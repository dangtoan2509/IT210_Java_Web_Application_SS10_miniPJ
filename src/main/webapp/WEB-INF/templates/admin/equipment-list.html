<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Quản Lý Thiết Bị</title>
</head>
<body>
<div layout:fragment="content">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Quản Lý Tồn Kho Thiết Bị</h2>
        <a th:href="@{/student/catalog}" class="text-blue-600 hover:underline text-sm">Xem với góc độ Sinh Viên</a>
    </div>

    <div class="bg-white shadow border rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Mã Thiết Bị</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tên Thiết Bị</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Loại</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tổng Số</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Khả Dụng</th>
            </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
            <tr th:each="equipment : ${equipmentList}">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${equipment.id}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${equipment.name}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                    <span th:text="${equipment.type}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800"></span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${equipment.totalQuantity}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-blue-600" th:text="${equipment.availableQuantity}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
