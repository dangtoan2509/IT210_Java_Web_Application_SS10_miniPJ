<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Đăng Nhập - Rikkei Edu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .btn-rikkei { background-color: #B2322E; transition: 0.3s; }
        .btn-rikkei:hover { background-color: #922824; }
        .input-focus:focus { border-color: #B2322E; outline: none; ring: 0; }
    </style>
</head>
<body>
<div layout:fragment="content" class="min-h-screen flex items-center justify-center bg-gray-100 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white p-10 rounded-[30px] shadow-2xl border border-gray-50">

        <div class="text-center mb-8">
            <img class="mx-auto h-12 w-auto mb-4" src="https://qldt.rikkei.edu.vn/re-logo.png" alt="Rikkei Edu Logo">
            <h2 class="text-[28px] font-extrabold text-[#2D3748] uppercase tracking-tight">
                Quản lý Mượn Trả
            </h2>
            <p class="text-gray-600 mt-1 font-medium">Hệ thống Quản lý Mượn & Trả Thiết bị
            </p>
        </div>

        <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded mb-6 text-sm" role="alert">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/admin/do-login}" method="post" class="space-y-5">
            <div>
                <label class="block text-[15px] font-bold text-[#B2322E] mb-2">
                    * Email
                </label>
                <input type="text" name="username" required placeholder="Nhập địa chỉ email"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-gray-700 placeholder-gray-400 input-focus transition-all shadow-sm" />
            </div>

            <div class="relative">
                <label class="block text-[15px] font-bold text-[#B2322E] mb-2">
                    * Mật khẩu
                </label>
                <div class="relative">
                    <input type="password" name="password" id="password" required placeholder="Nhập mật khẩu"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl text-gray-700 placeholder-gray-400 input-focus transition-all shadow-sm" />
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                    </div>
                </div>
            </div>



            <button type="submit" class="w-full py-3.5 px-4 btn-rikkei text-white font-bold rounded-xl shadow-lg transform active:scale-[0.98]">
                Đăng nhập
            </button>

            <div class="text-center pt-2">
                <a th:href="@{/student/catalog}" class="text-sm text-gray-500 hover:text-[#B2322E] transition-colors">
                    ← Quay lại trang xem thiết bị
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
