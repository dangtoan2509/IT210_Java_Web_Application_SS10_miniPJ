<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Danh Sách Yêu Cầu</title>
</head>
<body>
<div layout:fragment="content">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Duyệt Yêu Cầu Mượn</h2>
        <a th:href="@{/admin/equipment-list}" class="px-4 py-2 bg-gray-100 border rounded text-sm text-gray-700 hover:bg-gray-200">Kho Thiết bị</a>
    </div>

    <div class="bg-white shadow border rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Mã SV</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Họ Tên</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Mã TB</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Số Lượng</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Từ ngày</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Đến ngày</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Trạng Thái</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Hành động</th>
            </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200 text-sm">
            <tr th:each="req : ${requestList}">
                <td class="px-6 py-4 whitespace-nowrap text-gray-900" th:text="${req.studentId}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-gray-500" th:text="${req.studentName}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-gray-900 font-medium" th:text="${req.equipmentId}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-gray-500" th:text="${req.quantity}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-gray-500" th:text="${req.borrowDate}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-gray-500" th:text="${req.returnDate}"></td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span th:if="${req.status == 'PENDING'}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800" th:text="${req.status}"></span>
                    <span th:if="${req.status == 'APPROVED'}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800" th:text="${req.status}"></span>
                    <span th:if="${req.status == 'REJECTED'}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800" th:text="${req.status}"></span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium flex gap-2">
                    <form th:if="${req.status == 'PENDING'}" th:action="@{/admin/approve/{id}(id=${req.id})}" method="post">
                        <button type="submit" class="text-green-600 hover:text-green-900 border border-green-600 rounded px-2 py-1 hover:bg-green-50">Approve</button>
                    </form>
                    <form th:if="${req.status == 'PENDING'}" th:action="@{/admin/reject/{id}(id=${req.id})}" method="post">
                        <button type="submit" class="text-red-600 hover:text-red-900 border border-red-600 rounded px-2 py-1 hover:bg-red-50">Reject</button>
                    </form>
                    <span th:if="${req.status != 'PENDING'}" class="text-gray-400 italic">Đã xử lý</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(requestList)}">
                <td colspan="8" class="px-6 py-4 text-center text-gray-500">Chưa có yêu cầu nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
