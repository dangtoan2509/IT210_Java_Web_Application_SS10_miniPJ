<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Danh Mục Thiết Bị</title>
</head>
<body>
<div layout:fragment="content">

    <div th:if="${successMessage}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4" role="alert">
        <span class="block sm:inline" th:text="${successMessage}"></span>
    </div>

    <h2 class="text-2xl font-bold mb-6 text-gray-800">Danh Mục Thiết Bị và Phòng Lab</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="equipment : ${equipmentList}" class="bg-white rounded-lg shadow overflow-hidden border">
            <img th:src="${equipment.imageUrl}" alt="Hình ảnh thiết bị" class="w-full h-48 object-cover">
            <div class="p-4">
                <h3 class="text-lg font-semibold text-gray-900" th:text="${equipment.name}">Tên Thiết Bị</h3>
                <p class="text-sm text-gray-500 mt-1">Loại: <span th:text="${equipment.type}">DEVICE</span></p>
                <div class="mt-4 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600">Còn lại: <span class="font-bold text-blue-600" th:text="${equipment.availableQuantity}"></span> / <span th:text="${equipment.totalQuantity}"></span></p>
                    </div>
                    <a th:href="@{/student/borrow/{id}(id=${equipment.id})}"
                       class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded shadow">
                        Đăng ký mượn
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
